name: Build ParticleSensor Windows Executable

on:
  push:
    branches: [main, master]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests PyQt5 matplotlib numpy pytz

      - name: Build executable
        working-directory: ParticleSensor
        run: pyinstaller ParticleSensor.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParticleSensor-Windows
          path: ParticleSensor/dist/ParticleSensor.exe
          if-no-files-found: error

      - name: Attach exe to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ParticleSensor/dist/ParticleSensor.exe
